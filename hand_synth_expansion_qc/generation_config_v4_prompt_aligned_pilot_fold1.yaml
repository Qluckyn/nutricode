# V4：生成语义与 CLIP 分类提示词对齐；历史 V2 配置保持不变，以保证既有结果可复现。
stage: HAND-SYNTH-EXPANSION-QC-POSE02-V4-PROMPT-ALIGNED-PILOT
fold: 1
base_seed: 22000
candidate_count_per_compound: 90
# 仅使用通过双手关键点与掩膜校验的训练受试者；失败图不强行借用他人条件。
usable_appearance_counts:
  malnourished_hand_pose02: 11
  normal_hand_pose02: 40
compound_classes: [malnourished_hand_pose02, normal_hand_pose02]
data:
  root: /root/autodl-tmp/data_hand/pose01_pose02_5fold_seed22
  split_manifest: /root/autodl-tmp/data_hand/pose01_pose02_5fold_seed22/split.json
v2_conditions_root: /root/autodl-tmp/runs/hand_synth_expansion_qc/fold_1_pose02/conditions_v2
condition_manifest: /root/autodl-tmp/runs/hand_synth_expansion_qc/fold_1_pose02/conditions_v2/final/condition_manifest.jsonl
generation_plan: /root/autodl-tmp/runs/hand_synth_expansion_qc/fold_1_pose02/generation_v4_prompt_aligned_pilot/candidate_plan.jsonl
output_root: /root/autodl-tmp/runs/hand_synth_expansion_qc/fold_1_pose02
generation_output_root: /root/autodl-tmp/runs/hand_synth_expansion_qc/fold_1_pose02/generation_v4_prompt_aligned_pilot
models:
  base_model: /root/autodl-tmp/models/AI-ModelScope/stable-diffusion-2-1
  controlnet_weight: /root/autodl-tmp/models/hand_synthesis_v2/controlnet_sd21_openpose/control_v11p_sd21_openposev2.safetensors
  controlnet_config: /root/autodl-tmp/models/hand_synthesis_v2/controlnet_sd21_openpose/control_v11p_sd21_openposev2.yaml
  hand_landmarker: /root/autodl-tmp/models/mediapipe/hand_landmarker.task
  dinov2: /root/autodl-tmp/models/hand_synthesis_v2/dinov2_small
  foundhand_root: /root/autodl-tmp/FoundHand
  foundhand_weight: /root/autodl-tmp/FoundHand/weights/DINO_EMA_11M_b50_lr1e-5_epoch6_step320k.ckpt
  foundhand_vae: /root/autodl-tmp/FoundHand/weights/vae-ft-mse-840000-ema-pruned.ckpt
  foundhand_sam: /root/autodl-tmp/FoundHand/weights/sam_vit_h_4b8939.pth
  lora_paths:
    malnourished_hand_pose02: /root/autodl-tmp/runs/hand_synth_expansion_qc/fold_1_pose02/lora_weights_v4_prompt_aligned/malnourished_hand_pose02/hand_nutrition_pose02/shot12_seed22_tpl1_notextlora/lr0.0001_epoch40/malnourished_hand_pose02/pytorch_lora_weights.safetensors
    normal_hand_pose02: /root/autodl-tmp/runs/hand_synth_expansion_qc/fold_1_pose02/lora_weights_v4_prompt_aligned/normal_hand_pose02/hand_nutrition_pose02/shot12_seed22_tpl1_notextlora/lr0.0001_epoch40/normal_hand_pose02/pytorch_lora_weights.safetensors
generation:
  resolution: 512
  inference_steps: 30
  guidance_scale: 3.5
  controlnet_scale: 0.8
  denoising_strength: 0.22
  denoising_strengths: [0.15, 0.22, 0.30]
  foundhand_cfg: 2.5
prompts:
  # 与 HAND_CLASS_PROMPTS 的三项表型一致；不使用 thin、bony、healthy 等额外类别捷径。
  malnourished_hand_pose02: "a top-down clinical photograph of the backs of both hands of an older adult, with reduced muscle fullness, reduced soft tissue fullness, and reduced fullness between the thumb and index finger, both hands lying flat, fingers naturally extended and separated, wrists and hands visible, white paper background, neutral lighting, natural elderly skin texture, realistic hand anatomy"
  normal_hand_pose02: "a top-down clinical photograph of the backs of both hands of an older adult, with preserved muscle fullness, preserved soft tissue fullness, and preserved fullness between the thumb and index finger, both hands lying flat, fingers naturally extended and separated, wrists and hands visible, white paper background, neutral lighting, natural elderly skin texture, realistic hand anatomy"
  # 负向提示词仅约束结构和成像错误；长度控制在 SD2.1 的 77-token 上限内。
  negative_pose02: "single hand, three hands, extra fingers, missing fingers, fused fingers, malformed hands, deformed anatomy, cropped hands, cropped wrists, palms facing camera, side view, closed fists, curled fingers, overlapping hands, jewelry, gloves, text, watermark, illustration, blurry"

qc:
  weights:
    structure_score: 0.40
    semantic_margin: 0.35
    diversity_score: 0.25
  structure_min_score: 0.78
  duplicate_similarity_threshold: 0.995
  diversity_similarity_floor: 0.85
  dino_batch_size: 32
